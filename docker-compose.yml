# VentureDive RAG — full stack
# Prerequisites: copy .env.example to .env
# Run: docker compose up --build
# App: http://localhost:3000 (first start may take several minutes while Ollama pulls models)

services:
  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
      - ./scripts/ollama-entrypoint.sh:/ollama-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/ollama-entrypoint.sh"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "ollama list 2>/dev/null | grep -qE 'llama3\\.2:3b|llama3\\.2:latest' && ollama list 2>/dev/null | grep -q 'nomic-embed-text'",
        ]
      interval: 30s
      timeout: 15s
      retries: 60
      start_period: 900s
    networks:
      - rag-network

  chroma:
    image: chromadb/chroma:latest
    container_name: rag-chroma
    ports:
      - "${CHROMA_HOST_PORT:-8000}:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      # Slim Chroma image has no python3/curl; bash /dev/tcp is zero-deps (see chroma-cookbook)
      test: ["CMD", "/bin/bash", "-c", "</dev/tcp/127.0.0.1/8000"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 45s
    networks:
      - rag-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-backend
    ports:
      - "${BACKEND_HOST_PORT:-4000}:4000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=4000
      - OLLAMA_BASE_URL=http://ollama:11434
      - CHROMA_URL=http://chroma:8000
      - CORS_ORIGIN=http://localhost:${FRONTEND_HOST_PORT:-3000}
    depends_on:
      ollama:
        condition: service_healthy
      chroma:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - rag-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag-frontend
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - rag-network

volumes:
  ollama-data:
  chroma-data:

networks:
  rag-network:
    driver: bridge
