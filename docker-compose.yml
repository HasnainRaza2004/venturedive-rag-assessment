# VentureDive RAG — full stack skeleton
# Run: docker compose up --build
# Copy .env.example to .env before first run.

services:
  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - rag-network
    # TODO (Phase 9): entrypoint to pull llama3.2:3b and nomic-embed-text

  chroma:
    image: chromadb/chroma:latest
    container_name: rag-chroma
    ports:
      - "${CHROMA_HOST_PORT:-8000}:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - rag-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-backend
    ports:
      - "${BACKEND_HOST_PORT:-4000}:4000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=4000
      - OLLAMA_BASE_URL=http://ollama:11434
      - CHROMA_URL=http://chroma:8000
    depends_on:
      ollama:
        condition: service_healthy
      chroma:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - rag-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag-frontend
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - rag-network

volumes:
  ollama-data:
  chroma-data:

networks:
  rag-network:
    driver: bridge
